server:
  port: 8081

spring:
  application:
    name: luxury-watch-backend
  datasource:
    url: jdbc:mysql://101.126.90.255:63306/luxury-watch-db?characterEncoding=utf8&connectTimeout=30000&socketTimeout=30000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: Gesoft9919.
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 连接池配置
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      validation-timeout: 5000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.luxurywatch.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# PageHelper 配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# Sa-Token 配置
sa-token:
  # Token 名称
  token-name: Authorization
  # Token 有效期 (单位: 秒)
  timeout: 86400
  # Token 临时有效期 (单位: 秒)
  active-timeout: 1800
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 是否共享 Token
  is-share: false
  # 是否输出操作日志
  is-log: true
  # Token 风格
  token-style: uuid
  # 是否从 cookie 读取 Token
  is-read-cookie: false
  # 是否从请求头读取 Token
  is-read-header: true

# 日志配置
logging:
  level:
    com.luxurywatch: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# 图片上传配置
upload:
  # 图片存储根目录
  image-path: D:/项目图标
  # 支持的图片格式
  allowed-extensions: jpg,jpeg,png,gif,webp
  # 最大文件大小 (单位：MB)
  max-file-size: 10
  # 图片访问基础URL
  base-url: /images
